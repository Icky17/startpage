<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8 UTF-16">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css">
    <script src="https://kit.fontawesome.com/50ca4bca32.js" crossorigin="anonymous"></script>
    <script src="./script/weather.js" async></script>

    <title>Startpage</title>

<body>
    
    <img class="image grow" alt="main image" src="/img/gold.jpg">

    
    <div class="content-container">

            <span> | </span>
            <span class="time"></span>
            <span> | </span>

        </div>
    </div>
    

<div class="card-container">

    <div class="container">
        <h2 class="title">
            <i class="fa-solid fa-envelope"></i>

        </h2>

            <a href="https://reddit.com">Reddit</a>
            <a href="https://www.linkedin.com/">LinkedIn</a>
            <a href="https://www.youtube.com/">YouTube</a>
            
    </div>


    <!---Developer Container-->
    <div class="container">
        <h2 class="title">
            <i class="fa-solid fa-terminal"></i>
            Dev
        </h2>
        <div class="links"></div>
            <a href="https://roadmap.sh/roadmaps">Roadmap.sh</a>
            <a href="https://www.github.com">Github</a>
            <a href="https://www.udemy.com/">Udemy</a>

            <!---<a href="https://www.rust-lang.org/learn">Rust</a>-->

        <h2 class="title">
            <i class="fa-solid fa-book"></i>

        </h2>
        <div class="links"></div>

            <a href="https://z-lib.io/">ZLibrary</a>

        </h2>

    <div class="container">
        <h2 class="title">
            <i class="fa-brands fa-linux"></i>

        </h2>
